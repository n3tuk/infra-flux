---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
namespace: metallb-system
resources:
  - metallb-helm.yaml
configMapGenerator:
  - name: helm-metallb-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=metallb-values.yaml
