---
controller:
  enabled: true
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  logLevel: info
  resources:
    limits: {}
    request:
      cpu: 100m
      memory: 64Mi

speaker:
  enabled: true
  frr:
    enabled: true
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  logLevel: info
  resources:
    limits: {}
    request:
      cpu: 100m
      memory: 64Mi

crds:
  enabled: true
  validationFailurePolicy: Fail

serviceMonitor:
  enabled: true
