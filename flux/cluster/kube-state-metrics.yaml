---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-state-metrics
spec:
  sourceRef:
    kind: OCIRepository
    name: baseline
  path: kube-state-metrics
  dependsOn:
    - name: prometheus
  interval: 1h
  retryInterval: 10m
  prune: true

  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-substitutions
