---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: elastic
spec:
  sourceRef:
    kind: OCIRepository
    name: baseline
  path: elastic
  dependsOn:
    - name: elastic-crds
    - name: ingress-nginx
  interval: 1h
  retryInterval: 10m
  prune: true

  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-substitutions
