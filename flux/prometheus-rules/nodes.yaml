---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nodes
  namespace: prometheus-metrics
  labels:
    alertmanager: metrics
spec:
  groups:
    - name: kubernetes-kubelet
      rules:
        - alert: KubeletMaxPodsWarning
          expr: |-
            max by (node) (
              max by (node) (
                kubelet_running_pods{
                  namespace="kube-system",
                  job="kubelet"
                }
              ) /
              max by (node) (
                kube_node_status_capacity{
                  job="kube-state-metrics",
                  resource="pods"
                }
              )
            ) > 0.80
          for: 15m
          annotations:
            title: >-
              `Node` has >80% of Maximum Pods Scheduled
            summary: >-
              One or more of the `Nodes` in the `{{$externalLabels.cluster}}` Cluster has schedules
              80% or more of maximum allowed `Pods`, which is above the *warning* limit.
            description: >-
              `{{$labels.node}}` `Node` (*{{$value|humanizePercentage}}*)
          labels:
            ignore: outside-extended-hours
            severity: warning
            slack: alerts
            pagerduty: P3

        - alert: KubeletMaxPodsCritical
          expr: |-
            max by (node) (
              max by (node) (
                kubelet_running_pods{
                  namespace="kube-system",
                  job="kubelet"
                }
              ) /
              max by (node) (
                kube_node_status_capacity{
                  job="kube-state-metrics",
                  resource="pods"
                }
              )
            ) > 0.95
          for: 15m
          annotations:
            title: >-
              `Node` has >95% of Maximum Pods Scheduled
            summary: >-
              One or more of the `Nodes` in the `{{$externalLabels.cluster}}` Cluster has schedules
              95% or more of maximum allowed `Pods`, which is above the *critical* limit.
            description: >-
              `{{$labels.node}}` `Node` (*{{$value|humanizePercentage}}*)
          labels:
            ignore: outside-extended-hours
            severity: critical
            slack: alerts
            pagerduty: P2

        - alert: KubeletDown
          expr: |-
            absent(
              up{
                namespace="kube-system",
                job="kubelet",
                metrics_path="/metrics"
              } == 1
            )
          annotations:
            title: >-
              `kubelet` has Disappeared from Prometheus
            summary: >-
              One or more `Nodes` in the `{{$externalLabels.cluster}}` Cluster has dissapeared from
              target discovery in Prometheus and may no longer accessable.
            description: >-
              `{{$labels.node}}` `Node`
          for: 5m
          labels:
            severity: critical
            ignore: outside-extended-hours
            slack: alerts
            pagerduty: P1

    - name: node-exporter
      rules:
        - alert: NodeFilesystemCapacityWarning
          expr: |-
            (
              ( node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!=""
                } /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!=""
                } < 0.5
              ) and (
                predict_linear(
                  node_filesystem_avail_bytes{
                    job="prometheus-node-exporter",
                    fstype!=""
                  }[6h], 7*24*60*60
                ) < 0
              ) and (
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!=""
                } == 0
              )
            ) * on(instance)
                group_left(nodename, domainname) (
                  node_uname_info{
                    job="prometheus-node-exporter"
                  }
                )
          for: 30m
          annotations:
            title: >-
              `Node` Filesystem Capacity
            summary: >-
              One or more `Nodes` in the `{{$externalLabels.cluster}}` Cluster have mountpoints
              which are consuming space on the underlying volumes, and *based on current usage are
              expected to fill up within the next seven days*.
            description: >-
              `{{$labels.nodename}}` `Node` (*{{$value|humanizePercentage}}%* on
              `{{$labels.mountpoint}}`)
          labels:
            severity: warning
            ignore: outside-non-work-hours
            slack: alerts
            pagerduty: P3

        - alert: NodeFilesystemCapacityCritical
          expr: |-
            (
              ( node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!=""
                } /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!=""
                } < 0.4
              ) and (
                predict_linear(
                  node_filesystem_avail_bytes{
                    job="prometheus-node-exporter",
                    fstype!=""
                  }[6h], 3*24*60*60
                ) < 0
              ) and (
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!=""
                } == 0
              )
            ) * on(instance)
                group_left(nodename, domainname) (
                  node_uname_info{
                    job="prometheus-node-exporter"
                  }
                )
          for: 30m
          annotations:
            title: >-
              `Node` Filesystem Capacity
            summary: >-
              One or more `Nodes` in the `{{$externalLabels.cluster}}` Cluster have mountpoints
              which are consuming space on the underlying volumes, and *based on current usage are
              expected to fill up within the next three days*.
            description: >-
              `{{$labels.nodename}}` `Node` (*{{$value|humanizePercentage}}%* on
              `{{$labels.mountpoint}}`)
          labels:
            severity: critical
            ignore: outside-non-work-hours
            slack: alerts
            pagerduty: P2

