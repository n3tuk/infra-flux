---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox-csi
spec:
  chartRef:
    kind: OCIRepository
    namespace: flux-system
    name: proxmox-csi-plugin
  interval: 3h
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  test:
    enable: true
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: helm-proxmox-csi-values
    - kind: ConfigMap
      name: helm-proxmox-csi-overrides
      optional: true
    - kind: Secret
      name: helm-proxmox-csi-overrides
      optional: true
