---
# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/main/notification.toolkit.fluxcd.io/provider_v1beta3.json
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: pagerduty
spec:
  type: pagerduty
  address: https://events.eu.pagerduty.com
  channel: ${flux_pagerduty_key}
  # Testing and development is being paused for PagerDuty, so suspend this provider until its
  # resumed at a future date, or it is removed entirely
  suspend: true
