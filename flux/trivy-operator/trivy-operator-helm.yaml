---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: aqua-security
      chart: trivy-operator
      interval: 5m
      version: 0.24.1
  interval: 3h
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  test:
    enable: true
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: helm-trivy-operator-values
    - kind: ConfigMap
      name: helm-trivy-operator-overrides
      optional: true
    - kind: Secret
      name: helm-trivy-operator-overrides
      optional: true
