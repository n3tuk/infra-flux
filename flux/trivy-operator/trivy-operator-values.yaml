---
serviceMonitor:
  enabled: true

trivy:
  image:
    tag: 0.56.2
    imagePullSecret: ghcr-login

  mode: Standalone

  storageClassEnabled: true
  storageClassName: proxmox-csi-ext4
  storageSize: 5Gi

  severity: MEDIUM,HIGH,CRITICAL
  slow: false
  githubToken: ~

  dbRegistry: ghcr.io
  dbRepository: aquasecurity/trivy-db
  javaDbRegistry: ghcr.io
  javaDbRepository: aquasecurity/trivy-java-db

compliance:
  cron: 0 */6 * * *
  specs:
    - k8s-cis-1.23
    - k8s-nsa-1.0
    - k8s-pss-baseline-0.1
    - k8s-pss-restricted-0.1

policiesBundle:
  existingSecret: true

nodeCollector:
  imagePullSecret: ghcr-login

  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

  volumeMounts:
    - name: var-lib-etcd
      mountPath: /var/lib/etcd
      readOnly: true
    - name: var-lib-kubelet
      mountPath: /var/lib/kubelet
      readOnly: true
    - name: var-lib-kube-scheduler
      mountPath: /var/lib/kube-scheduler
      readOnly: true
    - name: var-lib-kube-controller-manager
      mountPath: /var/lib/kube-controller-manager
      readOnly: true
    # - name: etc-systemd
    #   mountPath: /etc/systemd
    #   readOnly: true
    # - name: lib-systemd
    #   mountPath: /lib/systemd/
    #   readOnly: true
    - name: etc-kubernetes
      mountPath: /etc/kubernetes
      readOnly: true
    - name: etc-cni-netd
      mountPath: /etc/cni/net.d/
      readOnly: true

  volumes:
    - name: var-lib-etcd
      hostPath:
        path: /var/lib/etcd
    - name: var-lib-kubelet
      hostPath:
        path: /var/lib/kubelet
    - name: var-lib-kube-scheduler
      hostPath:
        path: /var/lib/kube-scheduler
    - name: var-lib-kube-controller-manager
      hostPath:
        path: /var/lib/kube-controller-manager
    # - name: etc-systemd
    #   hostPath:
    #     path: /etc/systemd
    # - name: lib-systemd
    #   hostPath:
    #     path: /lib/systemd
    - name: etc-kubernetes
      hostPath:
        path: /etc/kubernetes
    - name: etc-cni-netd
      hostPath:
        path: /etc/cni/net.d/
