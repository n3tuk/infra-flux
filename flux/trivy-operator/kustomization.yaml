---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: trivy-operator
  namespace: flux-system
namespace: trivy-system
resources:
  - namespace.yaml
  - trivy-operator-helm.yaml
configMapGenerator:
  - name: helm-trivy-operator-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=trivy-operator-values.yaml
