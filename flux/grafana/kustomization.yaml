---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
namespace: grafana-system
resources:
  - namespace.yaml
  - grafana-helm.yaml
configMapGenerator:
  - name: helm-grafana-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=grafana-values.yaml
