---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cloudflared
  namespace: flux-system
namespace: cloudflare-system
resources:
  - tunnel-helm.yaml
configMapGenerator:
  - name: helm-tunnel-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=tunnel-values.yaml
