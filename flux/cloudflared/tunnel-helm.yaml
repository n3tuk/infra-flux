---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tunnel
spec:
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: cloudflare
      chart: cloudflare-tunnel
      interval: 5m
      version: 0.3.2
  interval: 3h
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  test:
    enable: true
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: helm-tunnel-values
    - kind: ConfigMap
      name: helm-tunnel-overrides
      optional: true
    - kind: Secret
      name: helm-tunnel-overrides
      optional: true
