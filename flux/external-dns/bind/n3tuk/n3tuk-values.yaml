---
# Enfoce an override on all naming to allow concurrent external-dns services to
# operate within the same namespace, allowing DNS records to be managed
# centrally for multiple providers, as needed
nameOverride: n3tuk

serviceAccount:
  create: true
serviceMonitor:
  enabled: true

logLevel: info
logFormat: json

resources:
  limits: # Don't limit the CPU
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

provider:
  name: rfc2136
domainFilters:
  - kub3.uk
  - pip3.uk
  - t3st.uk
  - sit3.uk
  - liv3.uk
annotationPrefix: n3tuk.external-dns.alpha.kubernetes.io/

interval: 15m
triggerLoopOnEvent: true
policy: sync
sources:
  - ingress
  - service

registry: txt
txtOwnerId: ${cluster}/external-dns/n3tuk
txtPrefix: _%{record_type}.

extraArgs:
  rfc2136-host: '${bind_n3tuk_host}'
  rfc2136-port: 53
  rfc2136-zone:
    # A recent change in external-dns to support multiple zones with RFC2136
    # meant that there was a change in the way the zone names are handled,
    # specifically requiring that the zones be bare, and not end explicitly with
    # a dot. See:
    #   https://github.com/kubernetes-sigs/external-dns/issues/4337
    #   https://github.com/kubernetes-sigs/external-dns/pull/3976
    - kub3.uk
    - pip3.uk
    - t3st.uk
    - sit3.uk
    - liv3.uk
  rfc2136-tsig-keyname: n3tuk-update-key
  rfc2136-tsig-secret: '${bind_n3tuk_secret}'
  rfc2136-tsig-secret-alg: hmac-sha256
  rfc2136-tsig-axfr:
  rfc2136-min-ttl: 60s
