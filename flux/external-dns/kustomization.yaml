---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
namespace: external-dns
resources:
  - cloudflare-helm.yaml
configMapGenerator:
  - name: helm-cloudflare-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=cloudflare-values.yaml
